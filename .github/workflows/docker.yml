name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: jinnosuke420/rokboard3000:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 3000:3000 jinnosuke420/rokboard3000:latest
          sleep 5
          docker exec test-container wget -qO- http://localhost:3000 > /dev/null && echo "Container is healthy"
          docker stop test-container
          docker rm test-container

      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jinnosuke420/rokboard3000:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
